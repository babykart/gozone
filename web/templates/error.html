<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <button class="theme-toggle theme-toggle-fixed" onclick="toggleTheme()" title="Toggle theme">🌓</button>
    <main class="container" style="margin-top:4rem;text-align:center">
        <h1>Error</h1>
        <div class="alert alert-error" style="max-width:600px;margin:1rem auto">
            {{.Message}}
        </div>
        <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
    </main>
    <script src="/static/js/app.js"></script>
</body>
</html>
